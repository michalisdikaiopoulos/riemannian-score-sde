enabled: false

# Unsafe region definition (azimuthal wedge on S2)
phi_min: -0.3
phi_max: 0.3
target_n: 30

# Safety method: "early_window", "full_window_scaled", "late_window_scaled", or "noise_rejection"
method: early_window
rejection_radius: 0.5  # geodesic radius (radians) for noise rejection

# Score correction
eta: 5.0      # overall strength of the safety correction
beta_max: 10.0 # hard cap on beta to prevent blow-up
t_min: 0.0    # early_window: disable guardrail below this t; late_window_scaled: lower bound of active window
t_max: 0.2     # late_window_scaled: upper bound of active window

# Heat kernel approximation
n_max: 5       # number of terms in the series expansion

# Delay method params ---
r_threshold: 0.1          # distance to unsafe region (activation radius)
repulsion_strength: 3.0   # how strong the push is
delay_factor: 0.5         # how much to slow time (0 = none, 1 = freeze)
t_delay: 0.3              # only apply delay below this t
